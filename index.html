<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 My Birthday Countdown</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding-top: 100px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        #year {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #ffd700;
        }

        #countdown {
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <h1>🎂 My Birthday Countdown 🎉🎈</h1>

    <div id="year"></div>
    <div id="countdown"></div>

    <script>
        const birthMonth = 11; // November
        const birthDay = 8;

        function getNextBirthday() {
            const now = new Date();

            let birthday = new Date(
                now.getFullYear(),
                birthMonth - 1,
                birthDay,
                0, 0, 0
            );

            if (now >= birthday) {
                birthday.setFullYear(birthday.getFullYear() + 1);
            }

            return birthday;
        }

        function updateCountdown() {
            const now = new Date();
            const birthday = getNextBirthday();

            const diff = birthday - now;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById("year").textContent =
                `birthday in November 8, ${birthday.getFullYear()}`;

            document.getElementById("countdown").textContent =
                `${days} days ${hours} hours ${minutes} minutes ${seconds} seconds`;

            document.title =
                `${days}d ${hours}h ${minutes}m | Birthday Countdown`;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
<audio controls loop>
    <source src="angrybird.mp3" type="audio/mpeg">
</audio>
    
</body>
</html>
